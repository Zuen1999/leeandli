<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書本義賣 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f0;color:#1a1a1a}
.header{background:#fff;border-bottom:1px solid #e5e5e5;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:18px;font-weight:600}.logo span{color:#1D9E75}
.nav-btns{display:flex;gap:8px}
.nav-btn{font-size:13px;padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:transparent;cursor:pointer;color:#333}
.nav-btn.active{background:#e6f7f1;color:#0F6E56;border-color:transparent;font-weight:500}
.page{display:none;padding:20px;max-width:1100px;margin:0 auto}
.page.active{display:block}
.search-bar{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:10px 16px;width:100%;font-size:14px;margin-bottom:16px}
.search-bar:focus{outline:none;border-color:#1D9E75}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.book-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px;cursor:pointer;transition:border-color 0.15s}
.book-card:hover{border-color:#1D9E75;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.book-card.sold-out{opacity:0.5;cursor:default}
.book-title{font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.45}
.book-price{font-size:15px;font-weight:600;color:#1D9E75;margin-bottom:8px}
.stock-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;display:inline-block}
.stock-ok{background:#EAF3DE;color:#3B6D11}
.stock-low{background:#FAEEDA;color:#854F0B}
.stock-out{background:#FCEBEB;color:#A32D2D}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:16px;padding:24px;width:360px;max-width:92vw}
.modal-title{font-size:16px;font-weight:600;margin-bottom:8px;line-height:1.4}
.modal-price{font-size:22px;font-weight:700;color:#1D9E75;margin-bottom:10px}
.modal-stock{font-size:13px;color:#666;margin-bottom:14px}
.input-label{font-size:12px;color:#888;margin-bottom:4px}
.modal-input{width:100%;border:1px solid #e5e5e5;border-radius:8px;padding:9px 12px;font-size:14px;margin-bottom:14px;background:#fafafa}
.modal-input:focus{outline:none;border-color:#1D9E75}
.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.qty-btn{width:32px;height:32px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.qty-val{font-size:18px;font-weight:600;min-width:28px;text-align:center}
.btn-row{display:flex;gap:8px}
.btn-primary{flex:1;padding:10px;border:none;border-radius:8px;background:#1D9E75;color:#fff;font-size:14px;cursor:pointer;font-weight:600}
.btn-primary:hover{background:#0F6E56}
.btn-cancel{padding:10px 18px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;color:#666}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#f5f5f0;border-radius:10px;padding:14px}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:700}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.table-wrap{overflow-x:auto}
.orders-table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
.orders-table th{text-align:left;padding:9px 10px;border-bottom:1px solid #e5e5e5;color:#888;font-weight:500;background:#fafafa}
.orders-table td{padding:9px 10px;border-bottom:1px solid #f0f0f0}
.admin-login{max-width:320px;margin:60px auto;background:#fff;border:1px solid #e5e5e5;border-radius:16px;padding:28px}
.admin-login h2{font-size:17px;font-weight:600;margin-bottom:18px}
.paid-badge{background:#EAF3DE;color:#3B6D11;font-size:11px;padding:3px 10px;border-radius:10px;cursor:pointer;border:none;font-weight:500}
.unpaid-badge{background:#FAEEDA;color:#854F0B;font-size:11px;padding:3px 10px;border-radius:10px;cursor:pointer;border:none;font-weight:500}
.delete-btn{background:#FCEBEB;color:#A32D2D;font-size:11px;padding:3px 10px;border-radius:10px;cursor:pointer;border:none;font-weight:500}
.export-btn{font-size:13px;padding:7px 14px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;cursor:pointer}
.admin-search-input{font-size:13px;padding:7px 14px;border:1px solid #e5e5e5;border-radius:8px;width:200px}
.admin-search-input:focus{outline:none;border-color:#1D9E75}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:11px 22px;border-radius:10px;font-size:14px;z-index:999;display:none;font-weight:500}
</style>
</head>
<body>
<div class="header">
  <div class="logo">📚 <span>書本義賣</span> 2026</div>
  <div class="nav-btns">
    <button class="nav-btn active" onclick="showPage('shop',this)">選購書籍</button>
    <button class="nav-btn" onclick="showPage('admin',this)">後台管理</button>
  </div>
</div>

<div class="page active" id="page-shop">
  <input class="search-bar" type="text" placeholder="🔍 搜尋書名..." oninput="renderBooks()" id="search-input">
  <div class="books-grid" id="books-grid"></div>
</div>

<div class="page" id="page-admin">
  <div id="admin-login-area">
    <div class="admin-login">
      <h2>🔐 後台管理員登入</h2>
      <div class="input-label" style="margin-bottom:6px">密碼</div>
      <input class="modal-input" type="password" id="admin-pw" onkeydown="if(event.key==='Enter')adminLogin()">
      <button class="btn-primary" onclick="adminLogin()" style="width:100%">登入</button>
    </div>
  </div>
  <div id="admin-content" style="display:none">
    <div class="admin-header">
      <div style="font-size:17px;font-weight:600">訂單總覽</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input class="admin-search-input" type="text" placeholder="搜尋 Initial 或書名..." oninput="renderAdmin()" id="admin-search">
        <button class="export-btn" onclick="exportCSV()">📥 匯出 CSV</button>
        <button class="nav-btn" onclick="adminLogout()">登出</button>
      </div>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="table-wrap">
      <table class="orders-table">
        <thead><tr><th>時間</th><th>同仁</th><th>書名</th><th>數量</th><th>金額</th><th>狀態</th><th>操作</th></tr></thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="modal-area"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  addDoc,
  updateDoc,
  doc,
  getDocs,
  setDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// =====================
// Firebase 設定（你給的已放好）
// =====================
const firebaseConfig = {
  apiKey: "AIzaSyDegjtEiG9Sp76gAf-FsXFGie5cP3q9HPg",
  authDomain: "book-sale-78900.firebaseapp.com",
  projectId: "book-sale-78900",
  storageBucket: "book-sale-78900.firebasestorage.app",
  messagingSenderId: "488413671265",
  appId: "1:488413671265:web:2f9994cfc50e98266f9f20",
  measurementId: "G-42DYQZ2QH8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =====================
// 預設書單（第一次自動建立用）
// =====================
const BOOKS_DATA = [
  {id:"1", title:"逆境翻身：用心理韌性打造贏家心態", price:0, stock:3},
  {id:"2", title:"書名二", price:0, stock:3},
  {id:"3", title:"書名三", price:0, stock:3},
  {id:"4", title:"書名四", price:0, stock:3},
  {id:"5", title:"書名五", price:0, stock:3},
  {id:"6", title:"書名六", price:0, stock:3},
];
// 後台密碼（可自行修改）
const ADMIN_PASSWORD = "sale2025";
// =============================================

let books = JSON.parse(localStorage.getItem('bs_books')||'null') || JSON.parse(JSON.stringify(BOOKS_DATA));
let orders = JSON.parse(localStorage.getItem('bs_orders')||'[]');
let adminLoggedIn = false;
let _qty = 1;

function save(){
  localStorage.setItem('bs_books', JSON.stringify(books));
  localStorage.setItem('bs_orders', JSON.stringify(orders));
}

let books = [];
let orders = [];
let _qty = 1;

// =====================
// 初始化資料（第一次自動塞資料）
// =====================
async function initBooks() {
  const snap = await getDocs(collection(db, "books"));

  if (snap.empty) {
    for (let b of BOOKS_DATA) {
      await setDoc(doc(db, "books", b.id), b);
    }
  }
}

// =====================
// 即時同步 books
// =====================
onSnapshot(collection(db, "books"), (snap) => {
  books = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderBooks();
});

// =====================
// 即時同步 orders
// =====================
onSnapshot(collection(db, "orders"), (snap) => {
  orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderAdmin();
});

// =====================
// UI：書籍列表
// =====================
function renderBooks(){
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const filtered = books.filter(b => !q || b.title.toLowerCase().includes(q));

  document.getElementById('books-grid').innerHTML =
    filtered.map(b => {
      const sc = b.stock > 2 ? 'stock-ok' : b.stock > 0 ? 'stock-low' : 'stock-out';
      const st = b.stock > 0 ? `剩 ${b.stock} 本` : '已售完';
      const pr = b.price > 0 ? `NT$ ${b.price}` : '現場定價';

      return `
        <div class="book-card ${b.stock===0?'sold-out':''}"
          onclick="${b.stock>0?`openModal('${b.id}')`:''}">
          <div class="book-title">${b.title}</div>
          <div class="book-price">${pr}</div>
          <span class="stock-badge ${sc}">${st}</span>
        </div>
      `;
    }).join('');
}

// =====================
// modal
// =====================
window.openModal = function(id){
  const b = books.find(x => x.id === id);
  _qty = 1;

  const render = () => {
    const iv = document.getElementById('modal-initial')?.value || '';
    const sc = b.stock > 2 ? 'stock-ok' : b.stock > 0 ? 'stock-low' : 'stock-out';
    const pr = b.price > 0 ? `NT$ ${b.price}` : '現場定價';

    document.getElementById('modal-area').innerHTML = `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">${b.title}</div>
          <div class="modal-price">${pr}</div>

          <div class="modal-stock">
            庫存：<span class="stock-badge ${sc}">${b.stock}</span>
          </div>

          <input class="modal-input" id="modal-initial"
            placeholder="Initial" value="${iv}">

          <div class="qty-row">
            <button class="qty-btn" onclick="adj(-1,'${id}')">−</button>
            <span class="qty-val">${_qty}</span>
            <button class="qty-btn" onclick="adj(1,'${id}')">+</button>
          </div>

          <div class="btn-row">
            <button class="btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn-primary" onclick="submitOrder('${id}')">確認</button>
          </div>
        </div>
      </div>
    `;
  };

  window._r = render;
  render();
};

window.adj = function(d,id){
  const b = books.find(x => x.id === id);
  _qty = Math.max(1, Math.min(b.stock, _qty + d));
  window._r();
};

window.closeModal = function(e){
  if(!e || e.target.classList.contains('modal-overlay')){
    document.getElementById('modal-area').innerHTML = '';
  }
};

// =====================
// 下單（🔥 Firebase 寫入）
// =====================
window.submitOrder = async function(id){
  const initial = (document.getElementById('modal-initial').value || '').toUpperCase();
  if(!initial) return alert("輸入 Initial");

  const b = books.find(x => x.id === id);
  if(b.stock < _qty) return alert("庫存不足");

  // 更新庫存
  await updateDoc(doc(db,"books",id), {
    stock: b.stock - _qty
  });

  // 新增訂單
  await addDoc(collection(db,"orders"), {
    initial,
    bookTitle: b.title,
    qty: _qty,
    amount: b.price * _qty,
    time: new Date().toLocaleString(),
    paid: false
  });

  document.getElementById('modal-area').innerHTML = '';
};

// =====================
// admin
// =====================
window.togglePaid = async function(id){
  const o = orders.find(x => x.id === id);
  await updateDoc(doc(db,"orders",id), {
    paid: !o.paid
  });
};

window.delOrder = async function(id){
  await deleteDoc(doc(db,"orders",id));
};

window.renderAdmin = function(){
  const q = (document.getElementById('admin-search')?.value || '').toLowerCase();
  const f = q
    ? orders.filter(o => o.initial.toLowerCase().includes(q) || o.bookTitle.toLowerCase().includes(q))
    : orders;

  document.getElementById('orders-tbody').innerHTML =
    f.map(o => `
      <tr>
        <td>${o.time}</td>
        <td>${o.initial}</td>
        <td>${o.bookTitle}</td>
        <td>${o.qty}</td>
        <td>${o.amount}</td>
        <td>
          <button onclick="togglePaid('${o.id}')">
            ${o.paid ? "已付款" : "未付款"}
          </button>
        </td>
        <td>
          <button onclick="delOrder('${o.id}')">刪除</button>
        </td>
      </tr>
    `).join('');
};

// =====================
// 啟動
// =====================
initBooks();

window.renderBooks = renderBooks;
</script>
</body>
</html>
